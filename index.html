    <!-- TradingView Top Stories Widget - injected directly in HTML -->
    <script>
    (function() {
      function injectTradingViewNews() {
        var container = document.getElementById('tradingview-news-widget');
        if (!container) {
          // Retry until React renders the container
          setTimeout(injectTradingViewNews, 500);
          return;
        }
        // Don't inject twice
        if (container.querySelector('.tradingview-widget-container')) return;
        
        // Create the widget
        var widgetContainer = document.createElement('div');
        widgetContainer.className = 'tradingview-widget-container';
        widgetContainer.style.height = '560px';
        widgetContainer.style.width = '100%';
        
        var widgetInner = document.createElement('div');
        widgetInner.className = 'tradingview-widget-container__widget';
        widgetInner.style.height = '100%';
        widgetInner.style.width = '100%';
        widgetContainer.appendChild(widgetInner);
        
        var copyright = document.createElement('div');
        copyright.className = 'tradingview-widget-copyright';
        copyright.innerHTML = '<a href="https://www.tradingview.com/news/" rel="noopener nofollow" target="_blank"><span class="blue-text">Top stories</span></a> by TradingView';
        copyright.style.display = 'none';
        widgetContainer.appendChild(copyright);
        
        var script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-timeline.js';
        script.async = true;
        script.textContent = JSON.stringify({
          "feedMode": "all_symbols",
          "isTransparent": true,
          "displayMode": "regular",
          "width": "100%",
          "height": "100%",
          "colorTheme": "dark",
          "locale": document.documentElement.lang === "en" ? "en" : "es"
        });
        widgetContainer.appendChild(script);
        
        container.appendChild(widgetContainer);
      }
      
      // Start trying after DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          setTimeout(injectTradingViewNews, 1000);
        });
      } else {
        setTimeout(injectTradingViewNews, 1000);
      }
    })();
    </script>
