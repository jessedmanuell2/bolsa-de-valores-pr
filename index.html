  <body>
    

    <div id="root"></div>

    <!-- News Section - Independent of React -->
    <section id="bvpr-news-section">
      <div class="bvpr-news-container">
        <div class="bvpr-news-header">
          <div class="bvpr-news-badge">
            <svg viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8Z"/></svg>
            NOTICIAS EN VIVO
          </div>
          <h2 class="bvpr-news-title">Noticias del Mercado</h2>
          <p class="bvpr-news-subtitle">Las noticias financieras más importantes del momento, actualizadas en tiempo real desde fuentes confiables.</p>
        </div>
        <div id="bvpr-news-content">
          <div class="bvpr-news-loading">
            <div class="bvpr-news-spinner"></div>
          </div>
        </div>
        <div class="bvpr-news-footer">Powered by MarketWatch &bull; Actualizado en tiempo real</div>
      </div>
    </section>

    <script>
    (function() {
      var API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Ffeeds.marketwatch.com%2Fmarketwatch%2Ftopstories%2F&count=12';
      var container = document.getElementById('bvpr-news-content');
      var newsSection = document.getElementById('bvpr-news-section');

      // Move the news section inside #root's parent, right after the market section
      // We need to wait for React to render, then reposition the section
      function repositionSection() {
        var rootEl = document.getElementById('root');
        if (!rootEl || !rootEl.firstChild) return false;
        // Find the footer or last major section to insert before
        var footer = rootEl.querySelector('footer');
        if (footer) {
          footer.parentNode.insertBefore(newsSection, footer);
          return true;
        }
        // Fallback: append inside root
        rootEl.appendChild(newsSection);
        return true;
      }

      // Try to reposition after React renders
      var attempts = 0;
      var repoInterval = setInterval(function() {
        attempts++;
        if (repositionSection() || attempts > 40) {
          clearInterval(repoInterval);
        }
      }, 250);

      function formatDate(dateStr) {
        try {
          var dt = new Date(dateStr);
          var now = new Date();
          var diffMin = Math.floor((now - dt) / 60000);
          if (diffMin < 1) return 'Ahora';
          if (diffMin < 60) return diffMin + 'm';
          if (diffMin < 1440) return Math.floor(diffMin / 60) + 'h';
          return dt.toLocaleDateString('es-PR', { month: 'short', day: 'numeric' });
        } catch(e) { return ''; }
      }

      function renderNews(items) {
        var html = '<div class="bvpr-news-grid">';
        items.forEach(function(item) {
          var imgUrl = '';
          if (item.enclosure && item.enclosure.link) {
            imgUrl = item.enclosure.link;
          } else if (item.thumbnail) {
            imgUrl = item.thumbnail;
          }
          var source = item.author || 'MarketWatch';
          var date = formatDate(item.pubDate);
          var desc = item.description || '';
          // Strip HTML tags from description
          desc = desc.replace(/<[^>]*>/g, '');

          html += '<div class="bvpr-news-card">';
          html += '<a href="' + item.link + '" target="_blank" rel="noopener noreferrer">';
          
          if (imgUrl) {
            html += '<div class="bvpr-news-img-wrap">';
            html += '<img src="' + imgUrl + '" alt="" loading="lazy" onerror="this.parentNode.outerHTML=\'<div class=bvpr-news-img-placeholder><svg viewBox=&quot;0 0 24 24&quot;><path d=&quot;M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8Z&quot;/></svg></div>\'" />';
            html += '<div class="bvpr-news-img-grad"></div>';
            html += '</div>';
          } else {
            html += '<div class="bvpr-news-img-placeholder"><svg viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8Z"/></svg></div>';
          }

          html += '<div class="bvpr-news-body">';
          html += '<div class="bvpr-news-meta">';
          html += '<span class="bvpr-news-source">' + source + '</span>';
          html += '<span class="bvpr-news-dot">&bull;</span>';
          html += '<span class="bvpr-news-date">' + date + '</span>';
          html += '</div>';
          html += '<h3 class="bvpr-news-card-title">' + item.title + '</h3>';
          if (desc) {
            html += '<p class="bvpr-news-desc">' + desc + '</p>';
          }
          html += '</div>';
          html += '</a>';
          html += '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
      }

      function loadNews() {
        fetch(API_URL)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.status === 'ok' && data.items && data.items.length > 0) {
              renderNews(data.items.slice(0, 6));
            } else {
              container.innerHTML = '<div class="bvpr-news-error">No hay noticias disponibles en este momento.</div>';
            }
          })
          .catch(function() {
            container.innerHTML = '<div class="bvpr-news-error">No se pudieron cargar las noticias. Intente recargar la p&aacute;gina.</div>';
          });
      }

      loadNews();
      // Refresh every 5 minutes
      setInterval(loadNews, 300000);
    })();
    </script>

  </body>
